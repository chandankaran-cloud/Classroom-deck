<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Dashboard Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Share+Tech+Mono&display=swap');
        
        /* Transparent execution layers so backend background shows through clearly */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: transparent !important;
        }

        .mono-font {
            font-family: 'Share Tech Mono', monospace;
        }

        /* Frosted Glass UI Panels */
        .glass-widget {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        .drag-handle {
            cursor: grab;
        }
        .drag-handle:active {
            cursor: grabbing;
        }

        /* App Taskbar Dock */
        .dock-container {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Traffic Light Glow Animation States */
        .light-glow-green { box-shadow: 0 0 20px #22c55e; }
        .light-glow-yellow { box-shadow: 0 0 20px #eab308; }
        .light-glow-red { box-shadow: 0 0 20px #ef4444; }
    </style>
</head>
<body id="main-desktop" class="w-full h-full relative">

    <main id="workspace" class="w-full h-full relative overflow-hidden p-6">

        <div id="widget-clock" class="absolute w-72 rounded-2xl glass-widget overflow-hidden z-20 hidden" style="top: 40px; left: 40px;">
            <div class="drag-handle bg-slate-900/80 px-4 py-2.5 flex justify-between items-center border-b border-white/5">
                <span class="text-xs font-bold tracking-wider text-indigo-400">🕒 CLOCK</span>
                <button onclick="toggleWidget('clock')" class="text-slate-400 hover:text-rose-400 font-bold">✕</button>
            </div>
            <div class="p-6 text-center">
                <div id="clock-digital-time" class="mono-font text-4xl font-bold text-white tracking-widest">00:00:00</div>
                <div id="clock-calendar-date" class="text-xs text-slate-400 mt-1">Fetching...</div>
            </div>
        </div>

        <div id="widget-timer" class="absolute w-72 rounded-2xl glass-widget overflow-hidden z-20 hidden" style="top: 40px; left: 340px;">
            <div class="drag-handle bg-slate-900/80 px-4 py-2.5 flex justify-between items-center border-b border-white/5">
                <span class="text-xs font-bold tracking-wider text-emerald-400">⏱️ TIMER</span>
                <button onclick="toggleWidget('timer')" class="text-slate-400 hover:text-rose-400 font-bold">✕</button>
            </div>
            <div class="p-5 flex flex-col items-center">
                <div id="timer-display" class="mono-font text-4xl font-bold text-emerald-400 mb-4">01:00</div>
                <div class="grid grid-cols-3 gap-1.5 w-full mb-4 text-[10px] font-bold">
                    <button onclick="setTimer(60)" class="bg-slate-800 hover:bg-slate-700 py-1 rounded">1 Min</button>
                    <button onclick="setTimer(300)" class="bg-slate-800 hover:bg-slate-700 py-1 rounded">5 Min</button>
                    <button onclick="setTimer(600)" class="bg-slate-800 hover:bg-slate-700 py-1 rounded">10 Min</button>
                </div>
                <div class="flex space-x-2 w-full">
                    <button id="btn-timer-start" onclick="toggleTimer()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 font-bold py-2 rounded-xl text-xs tracking-wider">START</button>
                    <button onclick="resetTimer()" class="bg-slate-800 hover:bg-slate-700 px-4 rounded-xl text-xs">Reset</button>
                </div>
            </div>
        </div>

        <div id="widget-sound" class="absolute w-80 rounded-2xl glass-widget overflow-hidden z-20 hidden" style="top: 40px; left: 640px;">
            <div class="drag-handle bg-slate-900/80 px-4 py-2.5 flex justify-between items-center border-b border-white/5">
                <span class="text-xs font-bold tracking-wider text-rose-400">🎙️ SOUND TRAFFIC LIGHT</span>
                <button onclick="toggleWidget('sound')" class="text-slate-400 hover:text-rose-400 font-bold">✕</button>
            </div>
            <div class="p-5 flex flex-col items-center">
                
                <div id="mic-btn-container" class="text-center py-4">
                    <button onclick="startAudioMeter()" class="bg-rose-600 hover:bg-rose-500 font-bold px-5 py-2.5 rounded-xl text-xs tracking-wide transition-all">
                        Activate Sound Sensor
                    </button>
                </div>

                <div id="mic-active-container" class="w-full hidden flex flex-col items-center">
                    
                    <div class="w-20 bg-slate-950 p-3 rounded-3xl flex flex-col items-center space-y-3 border border-white/10 mb-4">
                        <div id="light-red" class="w-10 h-10 rounded-full bg-rose-950/40 border border-rose-900/50 transition-all duration-200"></div>
                        <div id="light-yellow" class="w-10 h-10 rounded-full bg-amber-950/40 border border-amber-900/50 transition-all duration-200"></div>
                        <div id="light-green" class="w-10 h-10 rounded-full bg-emerald-950/40 border border-emerald-900/50 transition-all duration-200"></div>
                    </div>

                    <div class="w-full px-2 mb-4">
                        <div class="flex justify-between text-[11px] text-slate-400 font-bold mb-1.5">
                            <span>ALERT THRESHOLD:</span>
                            <span id="limit-label" class="text-rose-400">70%</span>
                        </div>
                        <input type="range" id="sound-limit-slider" min="10" max="100" value="70" class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-rose-500">
                    </div>

                    <div class="w-full bg-slate-900/50 p-2.5 rounded-xl border border-white/5 flex items-center justify-between">
                        <span class="text-xs text-slate-300 font-medium">Bell Sound Notification</span>
                        <button id="btn-bell-mute" onclick="toggleBellMute()" class="px-3 py-1 text-[10px] font-bold tracking-wide rounded-lg bg-emerald-600/20 text-emerald-400 border border-emerald-500/30 transition-all">
                            🔊 ACTIVE
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <div id="widget-picker" class="absolute w-72 rounded-2xl glass-widget overflow-hidden z-20 hidden" style="top: 310px; left: 40px;">
            <div class="drag-handle bg-slate-900/80 px-4 py-2.5 flex justify-between items-center border-b border-white/5">
                <span class="text-xs font-bold tracking-wider text-purple-400">🎰 RANDOMIZER</span>
                <button onclick="toggleWidget('picker')" class="text-slate-400 hover:text-rose-400 font-bold">✕</button>
            </div>
            <div class="p-4">
                <div id="picker-display" class="bg-slate-950 rounded-xl h-16 flex items-center justify-center font-bold text-purple-300 text-lg mb-3 border border-white/5">Ready</div>
                <textarea id="picker-names" class="w-full bg-slate-900 text-white border border-white/10 rounded-lg p-2 text-xs h-14 resize-none outline-none focus:border-purple-500/40">Alex, Sam, Taylor, Jordan, Morgan, Jamie</textarea>
                <button onclick="spinNames()" class="w-full bg-purple-600 hover:bg-purple-500 font-bold py-2 rounded-xl text-xs mt-2 transition-all">SPIN ROSTER</button>
            </div>
        </div>

        <div id="widget-symbols" class="absolute w-[540px] rounded-2xl glass-widget overflow-hidden z-20 hidden" style="top: 310px; left: 340px;">
            <div class="drag-handle bg-slate-900/80 px-4 py-2.5 flex justify-between items-center border-b border-white/5">
                <span class="text-xs font-bold tracking-wider text-amber-400">📣 EXPECTED CLASSROOM WORK ENVIRONMENT</span>
                <button onclick="toggleWidget('symbols')" class="text-slate-400 hover:text-rose-400 font-bold">✕</button>
            </div>
            <div class="p-4 grid grid-cols-4 gap-3">
                <button onclick="setSymbol(this, 'Silence')" class="symbol-btn flex flex-col items-center justify-center p-4 bg-slate-800/30 border border-white/5 rounded-xl transition-all group hover:border-slate-500">
                    <span class="text-4xl mb-2 group-hover:scale-110 transition-transform">🤫</span>
                    <span class="text-xs font-bold text-slate-300">SILENCE</span>
                </button>
                <button onclick="setSymbol(this, 'Whisper')" class="symbol-btn flex flex-col items-center justify-center p-4 bg-slate-800/30 border border-white/5 rounded-xl transition-all group hover:border-slate-500">
                    <span class="text-4xl mb-2 group-hover:scale-110 transition-transform">💬</span>
                    <span class="text-xs font-bold text-slate-300">WHISPER</span>
                </button>
                <button onclick="setSymbol(this, 'Partner')" class="symbol-btn flex flex-col items-center justify-center p-4 bg-slate-800/30 border border-white/5 rounded-xl transition-all group hover:border-slate-500">
                    <span class="text-4xl mb-2 group-hover:scale-110 transition-transform">👥</span>
                    <span class="text-xs font-bold text-slate-300">PARTNER</span>
                </button>
                <button onclick="setSymbol(this, 'Group Work')" class="symbol-btn flex flex-col items-center justify-center p-4 bg-slate-800/30 border border-white/5 rounded-xl transition-all group hover:border-slate-500">
                    <span class="text-4xl mb-2 group-hover:scale-110 transition-transform">🏫</span>
                    <span class="text-xs font-bold text-slate-300">GROUP</span>
                </button>
            </div>
            <div class="bg-slate-950/60 py-2.5 text-center text-sm border-t border-white/5 text-amber-300 font-bold tracking-wider" id="current-symbol">
                CURRENT EXPECTATION: NOT SET
            </div>
        </div>

    </main>

    <nav class="absolute bottom-6 left-1/2 -translate-x-1/2 dock-container px-6 py-3 rounded-2xl flex items-center space-x-6 z-50 shadow-2xl">
        
        <button onclick="toggleWidget('clock')" class="flex flex-col items-center group focus:outline-none">
            <div class="w-12 h-12 rounded-xl bg-indigo-600 flex items-center justify-center text-xl shadow-lg transition-transform group-active:scale-90">🕒</div>
            <span class="text-[10px] font-bold text-slate-300 mt-1 tracking-wide">Clock</span>
        </button>

        <button onclick="toggleWidget('timer')" class="flex flex-col items-center group focus:outline-none">
            <div class="w-12 h-12 rounded-xl bg-emerald-600 flex items-center justify-center text-xl shadow-lg transition-transform group-active:scale-90">⏱️</div>
            <span class="text-[10px] font-bold text-slate-300 mt-1 tracking-wide">Timer</span>
        </button>

        <button onclick="toggleWidget('sound')" class="flex flex-col items-center group focus:outline-none">
            <div class="w-12 h-12 rounded-xl bg-rose-600 flex items-center justify-center text-xl shadow-lg transition-transform group-active:scale-90">🎙️</div>
            <span class="text-[10px] font-bold text-slate-300 mt-1 tracking-wide">Sound Level</span>
        </button>

        <button onclick="toggleWidget('picker')" class="flex flex-col items-center group focus:outline-none">
            <div class="w-12 h-12 rounded-xl bg-purple-600 flex items-center justify-center text-xl shadow-lg transition-transform group-active:scale-90">🎰</div>
            <span class="text-[10px] font-bold text-slate-300 mt-1 tracking-wide">Randomizer</span>
        </button>

        <button onclick="toggleWidget('symbols')" class="flex flex-col items-center group focus:outline-none">
            <div class="w-12 h-12 rounded-xl bg-amber-600 flex items-center justify-center text-xl shadow-lg transition-transform group-active:scale-90">📣</div>
            <span class="text-[10px] font-bold text-slate-300 mt-1 tracking-wide">Work Sym.</span>
        </button>
        
    </nav>

    <script>
        // Inline Synthetic Web Audio Synth Generator Engine
        let audioContextInstance = null;
        let isBellMuted = false;
        let alarmIntervalId = null;
        let isAlarmRinging = false;

        function getAudioContext() {
            if (!audioContextInstance) {
                audioContextInstance = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContextInstance.state === 'suspended') {
                audioContextInstance.resume();
            }
            return audioContextInstance;
        }

        function playBellSoundPulse() {
            if (isBellMuted) return;
            try {
                const ctx = getAudioContext();
                const now = ctx.currentTime;
                
                // Ringing core tone and harmonics synthesizers
                const frequencies = [587.33, 880, 1174.66]; 
                frequencies.forEach((f, idx) => {
                    const osc = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    
                    osc.type = "sine";
                    osc.frequency.setValueAtTime(f, now);
                    
                    gainNode.gain.setValueAtTime(idx === 0 ? 0.25 : 0.1, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                    
                    osc.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    
                    osc.start(now);
                    osc.stop(now + 0.8);
                });
            } catch (err) { console.warn("Audio Context synth drop:", err); }
        }

        function triggerFiveSecondAlarmSequence() {
            if (isAlarmRinging) return;
            isAlarmRinging = true;
            
            // Pulse the synthesizer chime every 600ms
            playBellSoundPulse();
            alarmIntervalId = setInterval(playBellSoundPulse, 600);

            setTimeout(() => {
                clearInterval(alarmIntervalId);
                alarmIntervalId = null;
                isAlarmRinging = false;
            }, 5000);
        }

        function toggleBellMute() {
            isBellMuted = !isBellMuted;
            const btn = document.getElementById('btn-bell-mute');
            if (isBellMuted) {
                btn.textContent = "🔇 MUTED";
                btn.className = "px-3 py-1 text-[10px] font-bold tracking-wide rounded-lg bg-rose-600/20 text-rose-400 border border-rose-500/30 transition-all";
                clearInterval(alarmIntervalId);
                isAlarmRinging = false;
            } else {
                btn.textContent = "🔊 ACTIVE";
                btn.className = "px-3 py-1 text-[10px] font-bold tracking-wide rounded-lg bg-emerald-600/20 text-emerald-400 border border-emerald-500/30 transition-all";
            }
        }

        // Module Toggle Controller System
        function toggleWidget(id) {
            const target = document.getElementById('widget-' + id);
            if (target) target.classList.toggle('hidden');
        }

        // Draggable Window Mechanics
        let activeZIndexLayer = 20;
        function makeMovable(element) {
            const dragHandle = element.querySelector('.drag-handle');
            if (!dragHandle) return;
            dragHandle.addEventListener('mousedown', (e) => {
                if (e.target.closest('button')) return;
                activeZIndexLayer++; 
                element.style.zIndex = activeZIndexLayer;
                let initialX = e.clientX, initialY = e.clientY;
                let offsetLeft = element.offsetLeft, offsetTop = element.offsetTop;
                function onMouseMove(moveEvent) {
                    element.style.left = (offsetLeft + (moveEvent.clientX - initialX)) + 'px';
                    element.style.top = (offsetTop + (moveEvent.clientY - initialY)) + 'px';
                }
                function onMouseUp() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                }
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        }
        document.querySelectorAll('.glass-widget').forEach(makeMovable);

        // Clock Engine
        setInterval(() => {
            const timeObject = new Date();
            const padding = value => String(value).padStart(2, '0');
            document.getElementById('clock-digital-time').textContent = `${padding(timeObject.getHours())}:${padding(timeObject.getMinutes())}:${padding(timeObject.getSeconds())}`;
            document.getElementById('clock-calendar-date').textContent = timeObject.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        }, 1000);

        // Timer Engine Layouts
        let durationSetting = 60, timeRemainingCountdown = 60, timerRunnerId = null;
        function renderTimer() {
            const minutesValue = Math.floor(timeRemainingCountdown / 60), secondsValue = timeRemainingCountdown % 60;
            document.getElementById('timer-display').textContent = `${String(minutesValue).padStart(2,'0')}:${String(secondsValue).padStart(2,'0')}`;
        }
        function setTimer(seconds) { clearInterval(timerRunnerId); timerRunnerId = null; durationSetting = seconds; timeRemainingCountdown = seconds; renderTimer(); }
        function toggleTimer() {
            if (timerRunnerId) { clearInterval(timerRunnerId); timerRunnerId = null; document.getElementById('btn-timer-start').textContent = "START"; }
            else {
                document.getElementById('btn-timer-start').textContent = "PAUSE";
                timerRunnerId = setInterval(() => {
                    if (timeRemainingCountdown <= 1) { clearInterval(timerRunnerId); timerRunnerId = null; alert("Timer Completed!"); timeRemainingCountdown = durationSetting; }
                    else { timeRemainingCountdown--; }
                    renderTimer();
                }, 1000);
            }
        }
        function resetTimer() { clearInterval(timerRunnerId); timerRunnerId = null; timeRemainingCountdown = durationSetting; renderTimer(); document.getElementById('btn-timer-start').textContent = "START"; }

        // Audio Sound Level Traffic Light Monitor Engine
        async function startAudioMeter() {
            getAudioContext(); // Initialize audio context on explicit user gesture handshake
            try {
                const mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                const ctx = getAudioContext();
                const sourceNode = ctx.createMediaStreamSource(mediaStream);
                const streamAnalyzer = ctx.createAnalyser();
                streamAnalyzer.fftSize = 64;
                sourceNode.connect(streamAnalyzer);
                
                document.getElementById('mic-btn-container').classList.add('hidden');
                document.getElementById('mic-active-container').classList.remove('hidden');
                
                const frequenciesDataArray = new Uint8Array(streamAnalyzer.frequencyBinCount);
                
                const lightRed = document.getElementById('light-red');
                const lightYellow = document.getElementById('light-yellow');
                const lightGreen = document.getElementById('light-green');
                const limitSlider = document.getElementById('sound-limit-slider');

                function analyzeFrame() {
                    streamAnalyzer.getByteFrequencyData(frequenciesDataArray);
                    let sum = frequenciesDataArray.reduce((acc, curr) => acc + curr, 0);
                    let rawAverage = sum / frequenciesDataArray.length;
                    let currentVolumePct = Math.min(Math.round((rawAverage / 110) * 100), 100);

                    let targetThreshold = parseInt(limitSlider.value);
                    let warningMargin = targetThreshold * 0.82; 

                    // Default physical status resets
                    lightRed.className = "w-10 h-10 rounded-full bg-rose-950/20 border border-rose-900/30 transition-all";
                    lightYellow.className = "w-10 h-10 rounded-full bg-amber-950/20 border border-amber-900/30 transition-all";
                    lightGreen.className = "w-10 h-10 rounded-full bg-emerald-950/20 border border-emerald-900/30 transition-all";

                    if (currentVolumePct >= targetThreshold) {
                        // Critical state
                        lightRed.className = "w-10 h-10 rounded-full bg-rose-500 border-2 border-white light-glow-red transition-all";
                        triggerFiveSecondAlarmSequence();
                    } else if (currentVolumePct >= warningMargin) {
                        // Warning state
                        lightYellow.className = "w-10 h-10 rounded-full bg-yellow-400 border-2 border-white light-glow-yellow transition-all";
                    } else {
                        // Normal state
                        lightGreen.className = "w-10 h-10 rounded-full bg-green-500 border-2 border-white light-glow-green transition-all";
                    }

                    requestAnimationFrame(analyzeFrame);
                }
                analyzeFrame();
            } catch (err) { 
                alert("Microphone connection failed. Check browser privacy settings layout."); 
                console.error(err);
            }
        }
        document.getElementById('sound-limit-slider').addEventListener('input', e => document.getElementById('limit-label').textContent = e.target.value + '%');

        // Name Picker Randomizer
        function spinNames() {
            const lines = document.getElementById('picker-names').value.split(',').map(n => n.trim()).filter(n => n);
            if (!lines.length) return;
            let counter = 0, monitor = document.getElementById('picker-display');
            function executeCycle() {
                monitor.textContent = lines[Math.floor(Math.random() * lines.length)];
                if (counter++ < 12) setTimeout(executeCycle, 85);
            }
            executeCycle();
        }

        // Classroom Work Rules Symbol Setter
        function setSymbol(buttonEl, rulesName) {
            document.querySelectorAll('.symbol-btn').forEach(btn => btn.classList.remove('border-indigo-500', 'bg-slate-800'));
            buttonEl.classList.add('border-indigo-500', 'bg-slate-800');
            document.getElementById('current-symbol').textContent = "CURRENT EXPECTATION: " + rulesName.toUpperCase();
        }
    </script>
</body>
</html>
