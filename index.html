<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Hub Dashboard</title>
    <!-- Tailwind CSS for UI Layouts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Share+Tech+Mono&display=swap');
        
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0c111d !important;
        }
        .mono-font { font-family: 'Share Tech Mono', monospace; }
        
        /* Softer Premium Glassmorphism */
        .glass-widget {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        /* Smooth Elastic Pop In Animation for Widgets */
        @keyframes widgetPop {
            0% { opacity: 0; transform: scale(0.92) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .glass-widget:not(.hidden) {
            animation: widgetPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        
        /* Softer dock design */
        .dock-container {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        /* Traffic Light Glow Animations */
        .light-glow-green { box-shadow: 0 0 25px #22c55e; }
        .light-glow-yellow { box-shadow: 0 0 25px #eab308; }
        .light-glow-red { box-shadow: 0 0 25px #ef4444; }

        /* Dynamic background transition */
        .bg-transition {
            transition: background-image 0.5s ease-in-out;
        }

        /* Custom Scrollbar Styling for Scrollable Panels */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 99px;
        }
    </style>
</head>
<body id="app-body" class="w-full h-full relative select-none bg-transition bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80');">

    <!-- Soft dark dimming overlay to keep the controls completely readable and pop-out -->
    <div class="absolute inset-0 bg-slate-950/35 backdrop-blur-[0.5px] pointer-events-none z-0"></div>

    <!-- TOAST NOTIFICATION CONTAINER -->
    <div id="toast-container" class="absolute top-6 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center pointer-events-none space-y-2"></div>

    <!-- FULL SCREEN WORKSPACE -->
    <div class="w-full h-full relative overflow-hidden p-6 z-10">
        
        <div class="text-center pt-2">
            <h1 class="text-sm font-bold text-white/80 tracking-widest drop-shadow">FS CLASSROOM UTILITIES</h1>
        </div>

        <!-- 1. CLOCK -->
        <div id="widget-clock" class="absolute w-64 rounded-3xl glass-widget overflow-hidden z-20 hidden" style="top: 100px; left: 50px;">

                <span class="text-xs font-bold text-indigo-300 tracking-wider">🕒 CLOCK</span>
                <button onclick="toggleWidget('clock')" class="text-slate-400 hover:text-rose-400 font-bold transition">✕</button>
            </div>
            <div class="p-5 text-center">
                <div id="clock-digital-time" class="mono-font text-3xl font-bold text-white tracking-widest">00:00:00</div>
                <div id="clock-calendar-date" class="text-[11px] text-slate-300 mt-1 font-semibold tracking-wide">Fetching...</div>
            </div>
        </div>

        <!-- 2. TIMER -->
        <div id="widget-timer" class="absolute w-64 rounded-3xl glass-widget overflow-hidden z-20 hidden" style="top: 100px; left: 350px;">
            <div class="drag-handle bg-slate-900/40 px-4 py-2.5 flex justify-between items-center border-b border-white/5">
                <span class="text-xs font-bold text-emerald-300 tracking-wider">⏱️ TIMER</span>
                <button onclick="toggleWidget('timer')" class="text-slate-400 hover:text-rose-400 font-bold transition">✕</button>
            </div>
            <div class="p-5 flex flex-col items-center">
                <div id="timer-display" class="mono-font text-4xl font-bold text-emerald-300 mb-3 tracking-wider">01:00</div>
                <div class="grid grid-cols-3 gap-1.5 w-full mb-4 text-[10px] font-bold">
                    <button onclick="setTimer(60)" class="bg-slate-800/60 hover:bg-slate-700/60 transition py-1.5 rounded-lg text-white">1 Min</button>
                    <button onclick="setTimer(300)" class="bg-slate-800/60 hover:bg-slate-700/60 transition py-1.5 rounded-lg text-white">5 Min</button>
                    <button onclick="setTimer(600)" class="bg-slate-800/60 hover:bg-slate-700/60 transition py-1.5 rounded-lg text-white">10 Min</button>

                <div class="flex space-x-2 w-full text-white">
                    <button id="btn-timer-start" onclick="toggleTimer()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 transition font-bold py-1.5 rounded-xl text-xs tracking-wider">START</button>
                    <button onclick="resetTimer()" class="bg-slate-800/80 hover:bg-slate-700/80 transition px-4 rounded-xl text-xs">Reset</button>

        </div>

        <!-- 3. TRAFFIC LIGHT SOUND LEVEL METER -->

            <div class="drag-handle bg-slate-900/40 px-4 py-2.5 flex justify-between items-center border-b border-white/5">

    <script>
        // Premium Custom Toast Notifications
        function showNotification(message, type = "info") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let icon = "🔔";
            let colorClasses = "bg-slate-900 border-white/10 text-white";
            if (type === "success") { icon = "✅"; colorClasses = "bg-emerald-950/90 border-emerald-500/30 text-emerald-300"; }
            if (type === "error") { icon = "❌"; colorClasses = "bg-rose-950/90 border-rose-500/30 text-rose-300"; }
            if (type === "timer") { icon = "⏱️"; colorClasses = "bg-amber-950/90 border-amber-500/30 text-amber-300 animate-bounce"; }

            toast.className = `flex items-center space-x-3 px-5 py-3 rounded-2xl border ${colorClasses} shadow-2xl transition duration-300 transform translate-y-2 opacity-0 pointer-events-auto max-w-sm`;
            toast.innerHTML = `<span class="text-lg">${icon}</span> <span class="text-xs font-bold tracking-wide">${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 10);
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-10px]');
                setTimeout(() => { toast.remove(); }, 300);
            }, 3500);
        }

        // Audio Engine Setup
        let audioCtx = null, isMuted = false, alarmId = null, ringing = false;
        function getCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
        
        function playBell() {
            if (isMuted) return;
            try {
                const ctx = getCtx(), now = ctx.currentTime;
                [587.33, 880].forEach((f, i) => {
                    const o = ctx.createOscillator(), g = ctx.createGain();
                    o.frequency.setValueAtTime(f, now);
                    g.gain.setValueAtTime(i === 0 ? 0.2 : 0.08, now);
                    g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
                    o.connect(g); g.connect(ctx.destination);
                    o.start(now); o.stop(now + 0.6);
                });
            } catch(e){}
        }

        function triggerAlarm() {
            if (ringing) return; ringing = true; playBell();
            alarmId = setInterval(playBell, 600);
            
            // REDUCED ALARM BELL DURATION TO EXACTLY 3 SECONDS
            setTimeout(() => { clearInterval(alarmId); alarmId = null; ringing = false; }, 3000);
        }

        function toggleBellMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('btn-bell-mute');
            btn.textContent = isMuted ? "🔇 BELL MUTED" : "🔊 BELL ACTIVE";
            btn.className = isMuted ? "w-full py-1.5 text-[10px] font-bold rounded-xl bg-rose-600/20 text-rose-400 border border-rose-500/30 tracking-widest" : "w-full py-1.5 text-[10px] font-bold rounded-xl bg-emerald-600/20 text-emerald-400 border border-emerald-500/30 tracking-widest";
            if(isMuted) { clearInterval(alarmId); ringing = false; }
            showNotification(isMuted ? "Bell Sound Muted" : "Bell Sound Activated", "info");
        }

        // Draggable Widget Code
        function toggleWidget(id) { 
            const t = document.getElementById('widget-' + id); 
            if (t) {
                t.classList.toggle('hidden'); 
            }
        }
        
        let maxZ = 20;
        function drag(el) {
            const h = el.querySelector('.drag-handle'); if (!h) return;
            h.addEventListener('mousedown', (e) => {
                if (e.target.closest('button') || e.target.closest('input') || e.target.closest('textarea')) return;
                maxZ++; el.style.zIndex = maxZ;
                let sX = e.clientX, sY = e.clientY, oL = el.offsetLeft, oT = el.offsetTop;
                function move(m) { el.style.left = (oL + (m.clientX - sX)) + 'px'; el.style.top = (oT + (m.clientY - sY)) + 'px'; }
                function stop() { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop); }
                document.addEventListener('mousemove', move); document.addEventListener('mouseup', stop);
            });
        }
        document.querySelectorAll('.glass-widget').forEach(drag);

        // Clock & Calendar
        setInterval(() => {
            const d = new Date(), p = n => String(n).padStart(2, '0');
            document.getElementById('clock-digital-time').textContent = `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
            document.getElementById('clock-calendar-date').textContent = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        }, 1000);

        // Timer Code
        let dur = 60, rem = 60, tId = null;
        function updateT() { document.getElementById('timer-display').textContent = `${String(Math.floor(rem / 60)).padStart(2,'0')}:${String(rem % 60).padStart(2,'0')}`; }
        function setTimer(s) { clearInterval(tId); tId = null; dur = s; rem = s; updateT(); showNotification(`Timer set to ${s/60} Minute(s)`, "info"); }
        function toggleTimer() {
            if (tId) { clearInterval(tId); tId = null; document.getElementById('btn-timer-start').textContent = "START"; }
            else {
                document.getElementById('btn-timer-start').textContent = "PAUSE";
                tId = setInterval(() => { 
                    if (rem <= 1) { 
                        clearInterval(tId); 
                        tId = null; 
                        showNotification("Timer Complete! 🕒", "timer");
                        triggerAlarm();
                        rem = dur; 
                    } else { 
                        rem--; 
                    } 
                    updateT(); 
                }, 1000);
            }
        }
        function resetTimer() { clearInterval(tId); tId = null; rem = dur; updateT(); document.getElementById('btn-timer-start').textContent = "START"; }

        // Live Mic Level Detection
        async function startAudioMeter() {
            getCtx();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const ctx = getCtx(), src = ctx.createMediaStreamSource(stream), az = ctx.createAnalyser();
                az.fftSize = 64; src.connect(az);
                document.getElementById('mic-btn-container').classList.add('hidden');
                document.getElementById('mic-active-container').classList.remove('hidden');
                const data = new Uint8Array(az.frequencyBinCount);
                const r = document.getElementById('light-red'), y = document.getElementById('light-yellow'), g = document.getElementById('light-green'), s = document.getElementById('sound-limit-slider');
                
                showNotification("Microphone linked successfully!", "success");

                function frame() {
                    az.getByteFrequencyData(data);
                    let pct = Math.min(Math.round((data.reduce((a,b)=>a+b,0)/data.length/110)*100), 100);
                    let lim = parseInt(s.value);
                    r.className = "w-9 h-9 rounded-full bg-rose-950/40 border border-rose-900/50";
                    y.className = "w-9 h-9 rounded-full bg-amber-950/40 border border-amber-900/50";
                    g.className = "w-9 h-9 rounded-full bg-emerald-950/40 border border-emerald-500/30";
                    if (pct >= lim) { r.className = "w-9 h-9 rounded-full bg-rose-500 border border-white light-glow-red"; triggerAlarm(); }
                    else if (pct >= lim * 0.8) { y.className = "w-9 h-9 rounded-full bg-yellow-400 border border-white light-glow-yellow"; }
                    else { g.className = "w-9 h-9 rounded-full bg-green-500 border border-white light-glow-green"; }
                    requestAnimationFrame(frame);
                }
                frame();
            } catch(e) { showNotification("Microphone access denied or blocked.", "error"); }
        }
        document.getElementById('sound-limit-slider').addEventListener('input', e => document.getElementById('limit-label').textContent = e.target.value + '%');

        // Name Spinner
        function spinNames() {
            const names = document.getElementById('picker-names').value.split(',').map(n=>n.trim()).filter(n=>n);
            if(!names.length) return;
            let c = 0, box = document.getElementById('picker-display');
            function roll() { box.textContent = names[Math.floor(Math.random()*names.length)]; if(c++ < 10) setTimeout(roll, 80); }
            roll();
        }
        function setSymbol(btn) {
            document.querySelectorAll('.symbol-btn').forEach(b => b.classList.remove('border-amber-400/80', 'bg-slate-700/50', 'scale-105'));
            btn.classList.add('border-amber-400/80', 'bg-slate-700/50', 'scale-105');
        }

        // Custom Background Engine
        const backgroundPresets = {
            beach: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80',
            forest: 'https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=1920&q=80',
            space: 'https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?auto=format&fit=crop&w=1920&q=80',
            classroom: 'https://images.unsplash.com/photo-1497633762265-9d179a990aa6?auto=format&fit=crop&w=1920&q=80',
            dark: 'linear-gradient(135deg, #0f172a 0%, #020617 100%)'
        };

        function applyBgStyle(urlOrVal) {
            const body = document.getElementById('app-body');
            if (urlOrVal.startsWith('http') || urlOrVal.startsWith('data:')) {
                body.style.backgroundImage = `url('${urlOrVal}')`;
            } else if (urlOrVal.startsWith('linear-gradient')) {
                body.style.backgroundImage = urlOrVal;
            } else {
                const targetUrl = backgroundPresets[urlOrVal] || urlOrVal;
                if (targetUrl.startsWith('linear-gradient')) {
                    body.style.backgroundImage = targetUrl;
                } else {
                    body.style.backgroundImage = `url('${targetUrl}')`;
                }
            }
        }

        function changeBackgroundPreset(presetKey) {
            applyBgStyle(presetKey);
            localStorage.setItem('class_hub_background', presetKey);
            showNotification(`Background preset "${presetKey}" applied!`, "success");
        }

        function applyCustomBackground() {
            const inputVal = document.getElementById('custom-bg-input').value.trim();
            if (!inputVal) {
                showNotification("Please paste a valid image link.", "error");
                return;
            }
            applyBgStyle(inputVal);
            localStorage.setItem('class_hub_background', inputVal);
            showNotification("Your custom Google background is live!", "success");
        }

        // STICKY NOTE MECHANICS
        const stickyColors = {
            yellow: { container: 'bg-yellow-400/20', border: 'border-yellow-500/30' },
            pink: { container: 'bg-rose-400/20', border: 'border-rose-500/30' },
            green: { container: 'bg-emerald-400/20', border: 'border-emerald-500/30' },
            blue: { container: 'bg-sky-400/20', border: 'border-sky-500/30' }
        };

        function setStickyColor(color) {
            const pad = document.getElementById('sticky-pad');
            // Remove previous color classes
            Object.values(stickyColors).forEach(c => {
                pad.classList.remove(c.container, c.border);
            });
            // Add new classes
            pad.classList.add(stickyColors[color].container, stickyColors[color].border);
            
            localStorage.setItem('sticky_note_color', color);
            showNotification(`Sticky note color changed to ${color}`, "success");
        }

        function saveStickyNote() {
            const text = document.getElementById('sticky-content').value;
            localStorage.setItem('sticky_note_text', text);
        }

        function loadStickyNote() {
            const savedText = localStorage.getItem('sticky_note_text') || "";
            const savedColor = localStorage.getItem('sticky_note_color') || "yellow";
            
            document.getElementById('sticky-content').value = savedText;
            setStickyColor(savedColor);
        }

        // AGENDA CHECKLIST MECHANICS
        let agendaItems = [];

        function renderAgenda() {
            const listContainer = document.getElementById('agenda-list-container');
            listContainer.innerHTML = "";

            if (agendaItems.length === 0) {
                listContainer.innerHTML = `<div class="text-[11px] text-slate-500 text-center py-4 font-semibold italic">No plans added yet for today!</div>`;
                return;
            }

            agendaItems.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between bg-slate-900/60 border border-white/5 p-2 rounded-xl text-xs space-x-2";
                
                const checkedClass = item.completed ? "line-through text-slate-500" : "text-white";
                const isCheckedAttr = item.completed ? "checked" : "";

                row.innerHTML = `
                    <div class="flex items-center space-x-2.5 flex-1 min-w-0">
                        <input type="checkbox" ${isCheckedAttr} onchange="toggleAgendaItem(${index})" 
                               class="w-4 h-4 rounded-md border-white/10 text-teal-600 bg-slate-950 focus:ring-0 cursor-pointer">
                        <span class="truncate font-semibold tracking-wide ${checkedClass}">${escapeHtml(item.text)}</span>
                    </div>
                    <button onclick="deleteAgendaItem(${index})" class="text-slate-400 hover:text-rose-400 transition text-xs pr-1 font-bold">✕</button>
                `;
                listContainer.appendChild(row);
            });
        }

        function addAgendaItem() {
            const input = document.getElementById('agenda-input');
            const val = input.value.trim();
            if (!val) return;

            agendaItems.push({ text: val, completed: false });
            input.value = "";
            saveAgenda();
            renderAgenda();
            showNotification("Agenda task added!", "success");
        }

        function handleAgendaKey(e) {
            if (e.key === "Enter") {
                addAgendaItem();
            }
        }

        function toggleAgendaItem(index) {
            agendaItems[index].completed = !agendaItems[index].completed;
            saveAgenda();
            renderAgenda();
        }

        function deleteAgendaItem(index) {
            agendaItems.splice(index, 1);
            saveAgenda();
            renderAgenda();
            showNotification("Agenda task removed.", "info");
        }

        function saveAgenda() {
            localStorage.setItem('agenda_items', JSON.stringify(agendaItems));
        }

        function loadAgenda() {
            const saved = localStorage.getItem('agenda_items');
            if (saved) {
                try {
                    agendaItems = JSON.parse(saved);
                } catch(e) {
                    agendaItems = [];
                }
            } else {
                agendaItems = [
                    { text: "9:00 AM - Science Lab Introduction", completed: false },
                    { text: "10:15 AM - Interactive Game Session", completed: false },
                    { text: "11:30 AM - Clean up and Homework Check", completed: false }
                ];
            }
            renderAgenda();
        }

        // HTML escaping utility helper
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Startup Logic Wrapper
        window.addEventListener('DOMContentLoaded', () => {
            // Load custom background preference
            const savedBg = localStorage.getItem('class_hub_background');
            if (savedBg) {
                applyBgStyle(savedBg);
                if (!backgroundPresets[savedBg]) {
                    document.getElementById('custom-bg-input').value = savedBg;
                }
            }

            // Load Sticky Note and Agenda
            loadStickyNote();
            loadAgenda();
        });
    </script>
</body>
</html>
